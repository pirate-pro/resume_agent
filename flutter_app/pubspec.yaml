name: agent_runtime
description: Agent Runtime Flutter App
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI and Layout
  flutter_riverpod: ^2.4.9
  go_router: ^14.2.0

  # HTTP and Networking
  dio: ^5.4.3+1
  http: ^1.1.0

  # UI Components
  flutter_markdown: ^0.7.7+1
  flutter_highlight: ^0.7.0
  markdown: ^7.3.1

  # Utilities
  shared_preferences: ^2.2.2
  url_launcher: ^6.1.14
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Medium.ttf
    - family: IBM Plex Mono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
